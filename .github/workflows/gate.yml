name: gate
on:
  workflow_dispatch:
    inputs:
      result:
        description: "success or failure"
        required: true
        default: "success"
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: decide
        run: |
          echo "requested result: ${{ inputs.result }}"
          if [ "${{ inputs.result }}" = "success" ]; then exit 0; else exit 1; fi
