name: Log Event

on:
  pull_request:

jobs:
  log-event:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log GitHub event file
        run: cat "$GITHUB_EVENT_PATH" | jq .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install mergify CLI
        run: pip install mergify_cli-2026.2.19.2.dev10+gf49e38dd9-py3-none-any.whl

      - name: Run mergify ci scopes
        run: mergify ci scopes
