name: tests-b
on:
  pull_request:
    branches:
      - main
jobs:
  tests-succeeded:
    name: Tests Succeeded
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "workflow B — fails on first attempt, succeeds on re-run"
          if [ "${GITHUB_RUN_ATTEMPT}" = "1" ]; then
            echo "first attempt — failing intentionally"
            exit 1
          fi
          echo "re-run attempt — succeeding"
