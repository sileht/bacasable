name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.git-refs.outputs.base }}
      head: ${{ steps.git-refs.outputs.head }}
    steps:
      - uses: actions/checkout@v6
      - uses: Mergifyio/gha-mergify-ci@v12
        id: git-refs
        with:
          action: scopes-git-refs

  scopes:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.changes.outputs.head }}
          fetch-depth: 0
      - name: Detect affected scopes
        id: detect
        env:
          BASE: ${{ needs.changes.outputs.base }}
          HEAD: ${{ needs.changes.outputs.head }}
        run: |
          # mimic nx project
          echo "scopes=testing,foobar" >> "$GITHUB_OUTPUT"
      - uses: Mergifyio/gha-mergify-ci@v12
        with:
          action: scopes-upload
          scopes: ${{ steps.detect.outputs.scopes }}
          token: ${{ secrets.MERGIFY_TOKEN }}

  python:
    needs: scopes
    runs-on: ubuntu-latest
    steps:
      - name: Simulate merge queue CI
        if: startsWith(github.event.pull_request.title, 'merge queue:')
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          COUNT=$(echo "$TITLE" | grep -o '#' | wc -l)
          if [ "$COUNT" -ge 2 ]; then
            echo "Batch detected: title contains $COUNT PR references"
            exit 1
          fi
          sleep 300
      - run: echo Python CI succeeded

  docker:
    needs: scopes
    runs-on: ubuntu-latest
    steps:
      - name: Simulate merge queue CI
        if: startsWith(github.event.pull_request.title, 'merge queue:')
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          COUNT=$(echo "$TITLE" | grep -o '#' | wc -l)
          if [ "$COUNT" -ge 2 ]; then
            echo "Batch detected: title contains $COUNT PR references"
            exit 1
          fi
          sleep 300
      - run: sleep 20

  ci-gate:
    if: ${{ !cancelled() }}
    needs:
      - changes
      - scopes
      - python
      - docker
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        uses: Mergifyio/gha-mergify-ci@v12
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}
