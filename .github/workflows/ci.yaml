name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ fromJSON(steps.changes.outputs.scopes).docker }}
      backend: ${{ fromJSON(steps.changes.outputs.scopes).backend }}
      frontend: ${{ fromJSON(steps.changes.outputs.scopes).frontend }}
      docs: ${{ fromJSON(steps.changes.outputs.scopes).docs }}
      merge-queue: ${{ fromJSON(steps.changes.outputs.scopes).merge-queue }}
    steps:
      - uses: actions/checkout@v6
      - uses: Mergifyio/gha-mergify-ci@v11
        id: changes
        with:
          action: scopes
          token: ${{ secrets.MERGIFY_TOKEN }}

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Running backend tests..."
          sleep 15
          echo "Backend tests passed"

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Running frontend build & tests..."
          sleep 25
          echo "Frontend tests passed"

  docker:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Building Docker image..."
          sleep 30
          echo "Docker build passed"

  docs:
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Checking docs..."
          sleep 5
          echo "Docs check passed"

  check-merge-queue:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.title, 'merge queue:') }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for make-ci-fail file changes
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD | grep -q '^make-ci-fail$'; then
            echo "::error::CI failure triggered by make-ci-fail file"
            exit 1
          fi

  ci-gate:
    if: ${{ !cancelled() }}
    needs:
      - changes
      - backend
      - frontend
      - docker
      - docs
      - check-merge-queue
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        uses: Mergifyio/gha-mergify-ci@v11
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}
