name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docker: ${{ fromJSON(steps.changes.outputs.scopes).docker }}
      python: ${{ fromJSON(steps.changes.outputs.scopes).python }}
      merge-queue: ${{ fromJSON(steps.changes.outputs.scopes).merge-queue }}
    steps:
      - uses: actions/checkout@v6
      - uses: Mergifyio/gha-mergify-ci@v11
        id: changes
        with:
          action: scopes
          token: ${{ secrets.MERGIFY_TOKEN }}

  python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo Python CI succeeded

  docker:
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - run: sleep 20

  check-merge-queue:
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.pull_request.title, 'merge queue:') }}
    steps:
      - uses: actions/checkout@v6
      - name: Check for make-ci-fail file changes
        run: |
          git fetch origin ${{ github.event.pull_request.base.sha }}
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..HEAD | grep -q '^make-ci-fail$'; then
            echo "::error::PR title contains 'merge queue:' and the file 'make-ci-fail' was changed/added. Failing CI."
            exit 1
          fi

  ci-gate:
    if: ${{ !cancelled() }}
    needs:
      - changes
      - python
      - docker
      - check-merge-queue
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs succeeded
        uses: Mergifyio/gha-mergify-ci@v11
        with:
          action: wait-jobs
          jobs: ${{ toJSON(needs) }}
