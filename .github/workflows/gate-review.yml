name: gate-review
on:
  pull_request_review:
    types: [submitted]
jobs:
  wait:
    runs-on: ubuntu-latest
    steps:
      - name: delay
        env:
          BODY: ${{ github.event.review.body }}
        run: |
          echo "body=$BODY"
          case "$BODY" in *delay*) sleep 150 ;; *) sleep 5 ;; esac
  gate:
    needs: wait
    runs-on: ubuntu-latest
    steps:
      - name: decide
        env:
          BODY: ${{ github.event.review.body }}
        run: |
          echo "body=$BODY"
          case "$BODY" in *success*) exit 0 ;; *) exit 1 ;; esac
