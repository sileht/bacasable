# Repro config for MRGFY-7922 (scope-driven MQ bypass: behind-but-scope-disjoint
# PR must merge instead of sticking at "waiting for CI").
#
# Differences from the everyday .mergify.yml, so the repro merges deterministically
# any time of day:
#   - mode: parallel  (draft-mode queue — the bypass path; matches the customer)
#   - batch_size: 1   (each PR is alone in its batch -> the bypass can fire)
#   - NO schedule merge-condition (the everyday config only merges 18:00-20:00 Paris)
#
# scope_bypass_repro.sh backs up the real .mergify.yml, commits this one to main,
# runs the scenario, then restores the original.
#
# PREREQUISITES (the script cannot set these — they live in Mergify's engine):
#   1. The org (sileht) must have MERGE_QUEUE_SCOPE_UNAFFECTED_BYPASS_ENABLED_ORGS on.
#   2. To see it FIXED, the engine running this org must have #36256 deployed.
#      Before the deploy, the same repro shows the BUG (PR B stuck) — useful as a
#      before/after check.

merge_queue:
  mode: parallel
  max_parallel_checks: 5

queue_rules:
  - name: standard
    queue_conditions:
      - base=main
      # A PR only enters the queue once its own CI is green — the bypass then
      # trusts that green CI instead of re-running it.
      # - "check-success=ci-gate"
    merge_conditions:
      - "check-success=ci-gate"
    batch_max_wait_time: 30 seconds
    batch_size: 1

defaults:
  actions:
    rebase:
      bot_account: sileht

scopes:
  source:
    files:
      docker:
        include:
          - Dockerfile
      backend:
        include:
          - main*.py
      frontend:
        include:
          - frontend/**
      docs:
        include:
          - docs/**
      infra:
        include:
          - infra/**
      api:
        include:
          - api/**

merge_protections_settings:
  reporting_method: deployments
  auto_merge_conditions:
    - "label=queue"
