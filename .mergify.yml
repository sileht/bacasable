merge_queue:
  mode: isolated
  max_parallel_checks: 30

queue_rules:
  - name: standard
    queue_conditions:
      - base=main
      # - "check-success=buildkite/bacasable"
      - "check-success=ci-gate"
    merge_conditions:
      # - "check-success=buildkite/bacasable"
      - "check-success=ci-gate"
      - schedule = Mon-Fri 18:00-20:00[Europe/Paris]
    batch_max_wait_time: 30 seconds
    batch_size: 2

defaults:
  actions:
    rebase:
      bot_account: sileht

scopes:
  source:
    files:
      docker:
        include:
          - Dockerfile
      backend:
        include:
          - main*.py
      frontend:
        include:
          - frontend/**
      docs:
        include:
          - docs/**
      infra:
        include:
          - infra/**
      api:
        include:
          - api/**

merge_protections_settings:
  reporting_method: deployments
