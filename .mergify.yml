merge_queue:
  max_parallel_checks: 2
queue_rules:
  - name: standard
    autoqueue: true
    queue_conditions:
      - base=main
      - check-success=ci-gate
      - label=queue
    merge_conditions:
      - check-success=ci-gate
    batch_max_wait_time: 60 seconds
    batch_size: 2
defaults:
  actions:
    rebase:
      autosquash: true
      bot_account: sileht
scopes:
  source:
    files:
      docker:
        include:
          - Dockerfile
      python:
        include:
          - main*.py
