openapi: "3.0.3"
info:
  title: Bacasable API
  version: "0.1.0"
  description: Demo API for merge queue testing
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: OK
  /data:
    post:
      summary: Submit data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DataInput"
components:
  schemas:
    DataInput:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
