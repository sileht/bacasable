apiVersion: apps/v1
kind: Deployment
metadata:
  name: bacasable
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bacasable
  template:
    metadata:
      labels:
        app: bacasable
    spec:
      containers:
        - name: app
          image: bacasable:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              memory: "256Mi"
              cpu: "500m"
